<!DOCTYPE html>
<html>
<head>
  <title>UAE Stock AI</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #07111f, #0f172a);
      color: white;
    }

    header {
      padding: 25px 40px;
      display: flex;
      justify-content: space-between;
      background: rgba(255,255,255,0.05);
    }

    .logo {
      font-size: 22px;
      color: #38bdf8;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
    }

    .hero h1 {
      font-size: 40px;
    }

    .hero span {
      color: #22c55e;
    }

    .hero p {
      color: #cbd5e1;
      font-size: 16px;
    }

.btn {
  margin-top: 20px;
  padding: 14px 30px;
  border-radius: 12px;
  background: #38bdf8;
  color: white;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

    .cards {
      display: grid;
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 15px;
    }

    .ai-box {
      margin: 20px;
      padding: 20px;
      border-radius: 15px;
      background: rgba(34,197,94,0.15);
    }

    input {
      width: 90%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">🇦🇪 UAE Stock AI</div>
</header>

<section class="hero">
  <h1>Learn <span>UAE Stocks</span> with AI</h1>
  <p>Simple tool for beginners to understand investing</p>
  <button class="btn">Start</button>
</section>

<section class="cards">
  <div class="card">📊 Dividend Calculator</div>
  <div class="card">📚 Beginner Lessons</div>
  <div class="card">🤖 AI Explanation</div>
</section>

<h3>Ask AI</h3>
<input id="question" placeholder="Ask about stocks..." />
<button class="btn" onclick="askAI()">Ask</button>
<p id="answer"></p>
<script>

function askAI() {
  const input = document.getElementById("question").value.toLowerCase();
  const answer = document.getElementById("answer");

  if (input === "") {
    answer.innerText = "Please write a question.";
    return;
  } else if (input.includes("dividend")) {
    answer.innerText = "Dividend is money paid to shareholders.";
  } else if (input.includes("stock")) {
    answer.innerText = "Stock means ownership in a company.";
  } else if (input.includes("uae")) {
    answer.innerText = "UAE markets include ADX and DFM.";
  } else if (input.includes("adx")) {
    answer.innerText = "ADX is Abu Dhabi Securities Exchange.";
  } else if (input.includes("dfm")) {
    answer.innerText = "DFM is Dubai Financial Market.";
  } else if (input.includes("buy")) {
    answer.innerText = "To buy stocks: open account, deposit money, choose stock.";
  } else {
    answer.innerText = "Try asking about: stock, dividend, UAE, ADX, DFM.";
  }
}
</script>
  </body>
</html>
