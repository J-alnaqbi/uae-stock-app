<!DOCTYPE html>
<html>
<head>
  <title>UAE Stock AI</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #07111f, #0f172a);
      color: white;
    }

    header {
      padding: 25px 40px;
      background: rgba(255,255,255,0.05);
    }

    .logo {
      font-size: 22px;
      color: #38bdf8;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
    }

    .hero h1 {
      font-size: 40px;
    }

    .hero span {
      color: #22c55e;
    }

    .hero p {
      color: #cbd5e1;
    }

    .btn {
      margin-top: 15px;
      padding: 14px 30px;
      border-radius: 12px;
      background: #38bdf8;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .cards {
      display: grid;
      gap: 15px;
      padding: 20px;
    }

    .card, .box {
      background: rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 15px;
      margin: 20px;
    }

    input {
      width: 90%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
    }

    #answer, #dividendResult {
      margin-top: 15px;
      padding: 15px;
      border-radius: 12px;
      background: rgba(56,189,248,0.12);
      color: #38bdf8;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">🇦🇪 UAE Stock AI</div>
</header>

<section class="hero">
  <h1>Learn <span>UAE Stocks</span> with AI</h1>
  <p>Simple tool for beginners to understand investing</p>
  <button class="btn">Start</button>
</section>

<section class="cards">
  <div class="card">📊 Dividend Calculator</div>
  <div class="card">📚 Beginner Lessons</div>
  <div class="card">🤖 AI Explanation</div>
  <div class="card">⚠️ Risk Awareness</div>
</section>

<section class="box">
  <h3>Ask AI</h3>
  <input id="question" placeholder="Ask about stock, dividend, risk, ADX, DFM..." />
  <button class="btn" onclick="askAI()">Ask</button>
  <p id="answer"></p>
</section>

<section class="box">
  <h3>Dividend Calculator</h3>
  <input id="shares" type="number" placeholder="Number of shares" />
  <input id="dividend" type="number" placeholder="Dividend per share (AED)" />
  <button class="btn" onclick="calculateDividend()">Calculate</button>
  <p id="dividendResult"></p>
</section>

<script>
function askAI() {
  const input = document.getElementById("question").value.toLowerCase();
  const answer = document.getElementById("answer");

  if (input === "") {
    answer.innerText = "Please write a question.";
  } else if (input.includes("dividend")) {
    answer.innerText = "Dividend is money paid by a company to shareholders.";
  } else if (input.includes("stock")) {
    answer.innerText = "Stock means owning a small part of a company.";
  } else if (input.includes("uae")) {
    answer.innerText = "The UAE has two main stock markets: ADX and DFM.";
  } else if (input.includes("adx")) {
    answer.innerText = "ADX means Abu Dhabi Securities Exchange.";
  } else if (input.includes("dfm")) {
    answer.innerText = "DFM means Dubai Financial Market.";
  } else if (input.includes("risk")) {
    answer.innerText = "Risk means you may lose money if the stock price goes down.";
  } else if (input.includes("investment")) {
    answer.innerText = "Investment means buying assets and holding them for future value.";
  } else if (input.includes("trading")) {
    answer.innerText = "Trading is short-term buying and selling. Investing is usually long-term.";
  } else if (input.includes("buy")) {
    answer.innerText = "To buy stocks: open a broker account, deposit money, then choose a stock.";
  } else {
    answer.innerText = "Try asking about: stock, dividend, risk, UAE, ADX, DFM, trading.";
  }
}

function calculateDividend() {
  const shares = Number(document.getElementById("shares").value);
  const dividend = Number(document.getElementById("dividend").value);
  const result = document.getElementById("dividendResult");

  if (shares <= 0 || dividend <= 0) {
    result.innerText = "Please enter valid numbers.";
    return;
  }

  const total = shares * dividend;
  result.innerText = "Estimated dividend income: AED " + total.toFixed(2);
}
</script>

</body>
</html>
