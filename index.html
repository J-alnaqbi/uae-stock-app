<!DOCTYPE html>
<html>
<head>
  <title>UAE Stock AI</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #07111f, #0f172a);
      color: white;
    }

    header {
      padding: 25px 40px;
      display: flex;
      justify-content: space-between;
      background: rgba(255,255,255,0.05);
    }

    .logo {
      font-size: 22px;
      color: #38bdf8;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
    }

    .hero h1 {
      font-size: 40px;
    }

    .hero span {
      color: #22c55e;
    }

    .hero p {
      color: #cbd5e1;
      font-size: 16px;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      border-radius: 25px;
      background: #22c55e;
      border: none;
      font-weight: bold;
    }

    .cards {
      display: grid;
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 15px;
    }

    .ai-box {
      margin: 20px;
      padding: 20px;
      border-radius: 15px;
      background: rgba(34,197,94,0.15);
    }

    input {
      width: 90%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">🇦🇪 UAE Stock AI</div>
</header>

<section class="hero">
  <h1>Learn <span>UAE Stocks</span> with AI</h1>
  <p>Simple tool for beginners to understand investing</p>
  <button class="btn">Start</button>
</section>

<section class="cards">
  <div class="card">📊 Dividend Calculator</div>
  <div class="card">📚 Beginner Lessons</div>
  <div class="card">🤖 AI Explanation</div>
</section>

<h3>Ask AI</h3>
<input id="question" placeholder="Ask about stocks..." />
<button onclick="askAI()">Ask</button>
<p id="answer"></p>
  <script>
function askAI() {
  const input = document.getElementById("question");
  const answer = document.getElementById("answer");

  if (input.value === "") {
    answer.innerText = "Please write a question.";
    return;
  }

  if (input.value.toLowerCase().includes("dividend")) {
    answer.innerText = "Dividend is money paid to shareholders.";
  } else if (input.value.toLowerCase().includes("stock")) {
    answer.innerText = "Stock means ownership in a company.";
  } else {
    answer.innerText = "AI will be connected soon...";
  }
}
</script>
  </body>
</html>
